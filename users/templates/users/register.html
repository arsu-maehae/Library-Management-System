<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Register</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; padding: 20px;
        }
        
        .register-card {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%; max-width: 450px; text-align: center;
        }
        
        .register-card h2 { color: #2c3e50; margin-bottom: 25px; }
        
        .register-card form p { text-align: left; margin-bottom: 15px; }
        .register-card label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        .register-card input {
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; font-size: 1em; outline: none; transition: 0.3s;
        }
        .register-card input:focus {
            border-color: #27ae60; box-shadow: 0 0 5px rgba(39,174,96,0.3);
        }
        
        /* ซ่อนจุดไข่ปลา (bullet) ของข้อความแจ้งเตือนรหัสผ่าน */
        .helptext, .errorlist { font-size: 0.8em; color: #7f8c8d; list-style: none; padding: 0; margin-top: 5px; display: block; }
        .errorlist { color: #e74c3c; }

        .submit-btn {
            width: 100%; padding: 12px; background-color: #27ae60; color: white; 
            border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; 
            transition: 0.3s; margin-top: 10px; font-weight: bold;
        }
        .submit-btn:hover { background-color: #2ecc71; }
        
        .footer-text { margin-top: 20px; color: #666; font-size: 0.9em; }
        .footer-text a { color: #27ae60; text-decoration: none; font-weight: bold; }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>🎓 สมัครสมาชิกนักศึกษา</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="submit-btn">ยืนยันการสมัคร</button>
        </form>
        <div class="footer-text">
            มีบัญชีอยู่แล้ว? <a href="/">กลับไปหน้าเข้าสู่ระบบ</a>
        </div>
    </div>
</body>
</html>
