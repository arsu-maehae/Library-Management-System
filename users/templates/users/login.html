<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library System - Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        /* จัดให้อยู่ตรงกลางหน้าจอเป๊ะๆ ด้วย Flexbox */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f2f5; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; 
        }
        
        .login-card {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%; max-width: 400px; text-align: center;
        }
        
        .login-card h2 { color: #2c3e50; margin-bottom: 25px; }
        
        /* ตกแต่งฟอร์มที่ Django สร้างให้ (form.as_p) */
        .login-card form p { text-align: left; margin-bottom: 15px; }
        .login-card label { display: block; font-weight: bold; margin-bottom: 5px; color: #333; }
        .login-card input[type="text"], .login-card input[type="password"] {
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; font-size: 1em; outline: none; transition: 0.3s;
        }
        .login-card input[type="text"]:focus, .login-card input[type="password"]:focus {
            border-color: #3498db; box-shadow: 0 0 5px rgba(52,152,219,0.3);
        }
        
        /* ปุ่ม Login */
        .submit-btn {
            width: 100%; padding: 12px; background-color: #3498db; color: white; 
            border: none; border-radius: 8px; font-size: 1.1em; cursor: pointer; 
            transition: 0.3s; margin-top: 10px; font-weight: bold;
        }
        .submit-btn:hover { background-color: #2980b9; }
        
        /* ลิงก์ด้านล่าง */
        .footer-text { margin-top: 20px; color: #666; font-size: 0.9em; }
        .footer-text a { color: #3498db; text-decoration: none; font-weight: bold; }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>📚 เข้าระบบห้องสมุด</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="submit-btn">เข้าสู่ระบบ</button>
        </form>
        <div class="footer-text">
            ยังไม่มีบัญชีนักศึกษา? <a href="/register/">สมัครสมาชิกที่นี่</a>
        </div>
    </div>
</body>
</html>
